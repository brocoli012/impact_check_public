# Kurly Impact Checker - 수동 정책 정의 (Mock Data)
# 이 파일은 리인덱싱 시에도 유지되며 코드 주석 정책과 자동 병합됩니다.

policies:
  # ============================================================
  # delivery (배송) - 4개
  # ============================================================
  - name: "새벽배송 무료 배송 기준"
    description: "새벽배송 주문 금액이 40,000원 이상이면 무료 배송, 미만 시 배송비 3,000원 부과"
    category: "delivery"
    filePath: "src/services/delivery.ts"
    relatedComponents:
      - DeliveryFeeCalculator
      - CartSummary
    relatedApis:
      - /api/delivery/fee
      - /api/cart/summary
    relatedModules:
      - deliveryService
      - cartService

  - name: "새벽배송 주문 마감 시간"
    description: "새벽배송 주문 마감 시간은 23:00 KST이며, 마감 이후 주문은 다음날 새벽배송으로 처리"
    category: "delivery"
    filePath: "src/services/delivery.ts"
    relatedComponents:
      - OrderDeadlineBanner
      - DeliverySlotSelector
    relatedApis:
      - /api/delivery/slots
      - /api/delivery/deadline
    relatedModules:
      - deliveryScheduler
      - orderService

  - name: "냉동/상온 분리 배송 정책"
    description: "상품 보관 온도(냉장/냉동/상온)에 따라 별도 패키지로 분리 배송 처리"
    category: "delivery"
    filePath: "src/services/delivery.ts"
    relatedComponents:
      - PackageSplitter
      - DeliveryPackageView
    relatedApis:
      - /api/delivery/packages
      - /api/products/storage-type
    relatedModules:
      - packageService
      - productService

  - name: "당일배송 기준"
    description: "오전 7시 이전 주문 건은 당일 발송 처리, 이후 주문은 익일 발송"
    category: "delivery"
    filePath: "src/services/delivery.ts"
    relatedComponents:
      - SameDayDeliveryBadge
      - OrderTimeline
    relatedApis:
      - /api/delivery/same-day
      - /api/orders/dispatch
    relatedModules:
      - deliveryScheduler
      - orderDispatcher

  # ============================================================
